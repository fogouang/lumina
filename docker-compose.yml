services:
  backend:
    build: ./backend
    container_name: lumina_backend
    restart: always
    network_mode: host
    env_file:
      - ./backend/.env.prod
    volumes:
      - ./backend/static:/app/static
      - ./backend/media:/app/media
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --workers 3

  frontend:
    build: ./frontend
    container_name: lumina_frontend
    restart: always
    network_mode: host
    env_file:
      - ./frontend/.env.production
    environment:
      - PORT=3003