services:
  redis:
    image: redis:7-alpine
    container_name: lumina_redis
    restart: always
    networks:
      - app_network

  backend:
    build: ./backend
    container_name: lumina_backend
    restart: always
    env_file: ./backend/.env
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      - redis
    volumes:
      - ./backend/storage:/app/storage
    networks:
      - app_network
      - postgres_default

  celery:
    build: ./backend
    container_name: lumina_celery
    restart: always
    env_file: ./backend/.env
    command: uv run celery -A app.celery worker --loglevel=info
    depends_on:
      - redis
    networks:
      - app_network
      - postgres_default

  frontend:
    build: ./frontend
    container_name: lumina_frontend
    restart: always
    env_file: ./frontend/.env
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
  postgres_default:
    external: true